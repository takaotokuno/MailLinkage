# MailBatchSample Docker Compose foundation.
#
# Services:
# - mailserver: GreenMail standalone provides SMTP and IMAP in one lightweight
#   sandbox container for local verification.
# - mailreceiver-api: ASP.NET Core Web API receives extracted mail data over HTTP.
#
# Dev Container and container execution use service names (`mailserver`,
# `mailreceiver-api`) and container ports on the shared Compose network.
# Host OS execution uses published localhost ports.
name: mail-batch-sample

services:
  mailserver:
    image: greenmail/standalone:2.1.8
    container_name: mail-batch-sample-mailserver
    restart: unless-stopped
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.smtp
        -Dgreenmail.setup.test.imap
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users.login=email
        -Dgreenmail.users=${MAILSERVER_USERS:-test:password@example.local,admin:password@example.local}
    ports:
      # Host-side ports are intentionally non-privileged and stable for local tools.
      - "${MAILSERVER_SMTP_HOST_PORT:-1025}:3025"
      - "${MAILSERVER_IMAP_HOST_PORT:-1143}:3143"
    networks:
      - mail-batch-sample

  mailreceiver-api:
    build:
      context: ..
      dockerfile: MailBatchSample/src/MailReceiver.Api/Dockerfile
    container_name: mail-batch-sample-mailreceiver-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MailReceiver: Data Source=/app/data/mailreceiver.db
    ports:
      - "${MAILRECEIVER_API_HOST_PORT:-5000}:8080"
    volumes:
      - ./data:/app/data
    networks:
      - mail-batch-sample

networks:
  mail-batch-sample:
    name: mail-batch-sample-network
