name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MailLinkage.sln

      - name: Build
        run: dotnet build MailLinkage.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MailLinkage.sln --configuration Debug --no-restore --verbosity normal
